<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KBMixer icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d4f5f"/>
      <stop offset="100%" stop-color="#2a3542"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Long-shadow group (soft, single offset — readable at small sizes) -->
  <g opacity="0.22" fill="#042f2e">
    <path d="M108 292 L420 292 L432 420 L96 420 Z"/>
    <path d="M84 352 L350 352 L362 432 L72 432 Z"/>
    <ellipse cx="404" cy="404" rx="38" ry="42"/>
  </g>

  <!-- Monitor -->
  <g>
    <rect x="72" y="64" width="368" height="232" rx="28" fill="url(#chassis)"/>
    <rect x="72" y="64" width="368" height="232" rx="28" fill="none" stroke="#5a6d7e" stroke-width="2" opacity="0.5"/>
    <!-- Screen -->
    <rect x="92" y="84" width="328" height="176" rx="16" fill="#0f172a"/>
    <rect x="92" y="84" width="328" height="176" rx="16" fill="none" stroke="#334155" stroke-width="1"/>
    <!-- Stand -->
    <path d="M216 296 h80 l-12 36 h-56 z" fill="#2a3542"/>
    <rect x="232" y="328" width="48" height="10" rx="3" fill="#1e293b"/>
  </g>

  <!-- Screen UI: mixer -->
  <g>
    <!-- Left level ladder -->
    <g fill="#5eead4">
      <rect x="108" y="100" width="36" height="5" rx="2"/>
      <rect x="108" y="110" width="28" height="5" rx="2"/>
      <rect x="108" y="120" width="32" height="5" rx="2"/>
      <rect x="108" y="130" width="22" height="5" rx="2"/>
      <rect x="108" y="140" width="30" height="5" rx="2"/>
      <rect x="108" y="150" width="26" height="5" rx="2"/>
    </g>

    <!-- Center faders -->
    <g stroke="#334155" stroke-width="2" stroke-linecap="round">
      <line x1="196" y1="98" x2="196" y2="198"/>
      <line x1="252" y1="98" x2="252" y2="198"/>
      <line x1="308" y1="98" x2="308" y2="198"/>
    </g>
    <g fill="#ccfbf1">
      <rect x="188" y="118" width="16" height="10" rx="3"/>
      <rect x="244" y="148" width="16" height="10" rx="3"/>
      <rect x="300" y="132" width="16" height="10" rx="3"/>
    </g>

    <!-- Right: small bars + vertical meter -->
    <g fill="#5eead4">
      <rect x="352" y="100" width="40" height="5" rx="2"/>
      <rect x="352" y="110" width="32" height="5" rx="2"/>
      <rect x="352" y="120" width="36" height="5" rx="2"/>
    </g>
    <rect x="400" y="100" width="8" height="72" rx="2" fill="#1e293b"/>
    <rect x="400" y="124" width="8" height="20" rx="2" fill="#99f6e4"/>

    <!-- Spectrum / EQ (11 bars) -->
    <g fill="#2dd4bf">
      <rect x="98" y="212" width="13" height="36" rx="3"/>
      <rect x="118" y="198" width="13" height="50" rx="3"/>
      <rect x="138" y="220" width="13" height="28" rx="3"/>
      <rect x="158" y="190" width="13" height="58" rx="3"/>
      <rect x="178" y="206" width="13" height="42" rx="3"/>
      <rect x="198" y="196" width="13" height="52" rx="3"/>
      <rect x="218" y="214" width="13" height="34" rx="3"/>
      <rect x="238" y="188" width="13" height="60" rx="3"/>
      <rect x="258" y="202" width="13" height="46" rx="3"/>
      <rect x="278" y="194" width="13" height="54" rx="3"/>
      <rect x="298" y="208" width="13" height="40" rx="3"/>
    </g>
  </g>

  <!-- Keyboard + mouse: shared baseline, flush with small gap (aligns with monitor L/R) -->
  <g>
    <!-- Keyboard frame: x=72 .. 358; mouse: 370 .. 438 → span matches monitor 72..440 -->
    <rect x="72" y="358" width="286" height="86" rx="16" fill="url(#chassis)"/>
    <rect x="72" y="358" width="286" height="86" rx="16" fill="none" stroke="#5a6d7e" stroke-width="2" opacity="0.45"/>
    <!-- Top row: 8 equal keys (26×16), 6px gap, centered in inner width 262 (pad 12) -->
    <g fill="#99f6e4" opacity="0.95">
      <rect x="90" y="372" width="26" height="16" rx="3"/>
      <rect x="122" y="372" width="26" height="16" rx="3"/>
      <rect x="154" y="372" width="26" height="16" rx="3"/>
      <rect x="186" y="372" width="26" height="16" rx="3"/>
      <rect x="218" y="372" width="26" height="16" rx="3"/>
      <rect x="250" y="372" width="26" height="16" rx="3"/>
      <rect x="282" y="372" width="26" height="16" rx="3"/>
      <rect x="314" y="372" width="26" height="16" rx="3"/>
    </g>
    <!-- Bottom row: 2 + spacebar (4 column spans) + 2, same 32px rhythm -->
    <g fill="#ccfbf1" opacity="0.95">
      <rect x="90" y="396" width="26" height="16" rx="3"/>
      <rect x="122" y="396" width="26" height="16" rx="3"/>
      <rect x="154" y="396" width="122" height="16" rx="3"/>
      <rect x="282" y="396" width="26" height="16" rx="3"/>
      <rect x="314" y="396" width="26" height="16" rx="3"/>
    </g>
  </g>

  <g>
    <rect x="370" y="358" width="68" height="86" rx="34" fill="url(#chassis)"/>
    <rect x="370" y="358" width="68" height="86" rx="34" fill="none" stroke="#5a6d7e" stroke-width="2" opacity="0.45"/>
    <rect x="398" y="378" width="12" height="40" rx="6" fill="#99f6e4" opacity="0.9"/>
  </g>
</svg>
