name: UI golden capture

on:
  workflow_dispatch:
  push:
    paths:
      - "KBMixer/MainWindow.xaml"
      - "KBMixer/Themes/**"
      - "KBMixer/MainWindow.xaml.cs"
      - "KBMixer/App.xaml.cs"
      - "KBMixer/MixerChannelViewModel.cs"

jobs:
  capture:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Golden capture (mock mixer)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/ui | Out-Null
          dotnet run --project KBMixer\KBMixer.csproj -c Release -- --ui-golden="${{ github.workspace }}\artifacts\ui\actual.png"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-golden
          path: artifacts/ui/*.png
