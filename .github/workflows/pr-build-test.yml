name: PR build and test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build KBMixer\KBMixer.csproj -c Release --verbosity minimal

      - name: Test
        run: dotnet test KBMixer.Tests\KBMixer.Tests.csproj -c Release --no-build --verbosity minimal
